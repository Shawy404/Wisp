# Wisp — © Shawy404. All rights reserved.
appId: dev.shawy404.wisp
productName: Wisp
copyright: © Shawy404. All rights reserved.
directories:
  output: dist
  buildResources: build
files:
  - out/**
  - package.json
  # Runtime window icon (Linux/X11); packaged path stays ../../build/icon.png.
  - build/icon.png
asarUnpack:
  - node_modules/@mozilla/readability/**
# Auto-update source: GitHub Releases of this repo.
publish:
  provider: github
  owner: Shawy404
  repo: Wisp
linux:
  target:
    - AppImage
  category: Network
  synopsis: Araştırma için doğmuş tarayıcı
  desktop:
    entry:
      StartupWMClass: wisp
  # Helper binaries (yt-dlp) ship with the app — no manual installs.
  extraResources:
    - from: build/bin/linux
      to: bin
win:
  target:
    - nsis
    - portable
  extraResources:
    - from: build/bin/win
      to: bin
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
electronLanguages:
  - en-US
  - tr
npmRebuild: false
