<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Wisp — © Shawy404. The mascot: the wisp orb from the app's animations. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#191922"/>
      <stop offset="1" stop-color="#0a0a0e"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.46" r="0.5">
      <stop offset="0" stop-color="#7dd3a8" stop-opacity="0.55"/>
      <stop offset="0.6" stop-color="#7dd3a8" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#7dd3a8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb" cx="0.4" cy="0.32" r="0.75">
      <stop offset="0" stop-color="#c4f2da"/>
      <stop offset="0.45" stop-color="#7dd3a8"/>
      <stop offset="1" stop-color="#2c6650"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="115" fill="url(#bg)"/>
  <circle cx="256" cy="252" r="196" fill="url(#halo)"/>

  <!-- the wisp orb: rounded, slightly flat bottom like the animated mascot -->
  <path fill="url(#orb)" d="
    M 256 120
    C 342 120 396 178 396 254
    C 396 330 336 388 256 388
    C 176 388 116 330 116 254
    C 116 178 170 120 256 120
    Z"/>

  <!-- eyes -->
  <rect x="226" y="228" width="18" height="38" rx="9" fill="#0b0b10"/>
  <rect x="268" y="228" width="18" height="38" rx="9" fill="#0b0b10"/>

  <!-- soft highlight -->
  <ellipse cx="206" cy="182" rx="36" ry="24" fill="#ffffff" opacity="0.26"/>
</svg>
