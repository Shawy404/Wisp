<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a4a3c"/>
      <stop offset="0.5" stop-color="#15251e"/>
      <stop offset="1" stop-color="#0a0f0d"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#4da583"/>
      <stop offset="0.6" stop-color="#7dd3a8"/>
      <stop offset="1" stop-color="#d7fae8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7dd3a8" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#7dd3a8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="115" fill="url(#bgb)"/>
  <circle cx="322" cy="222" r="160" fill="url(#glow)"/>

  <!-- single flowing wisp line: an S-curve rising into a spiral, like a
       ghost light drifting; reads as a lowercase abstract "w" motion -->
  <path fill="none" stroke="url(#stroke)" stroke-width="34" stroke-linecap="round" d="
    M 128 396
    C 176 388, 208 344, 220 296
    C 232 248, 240 214, 268 190
    C 300 163, 348 170, 362 204
    C 374 233, 356 264, 326 264
    C 302 264, 288 246, 294 226"/>

  <!-- orb at the spiral's heart -->
  <circle cx="322" cy="222" r="14" fill="#eafff4"/>
  <!-- spark -->
  <circle cx="404" cy="132" r="10" fill="#a8ecc9" opacity="0.9"/>
  <circle cx="372" cy="96" r="6" fill="#7dd3a8" opacity="0.55"/>
</svg>
